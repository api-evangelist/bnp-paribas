aid: bnp-paribas
name: BNP Paribas
description: >-
  BNP Paribas is a leading international banking group providing a wide range of
  financial services to individuals, businesses, and institutions worldwide. The company
  offers APIs through its CIB Developer Portal covering capital markets, payment services,
  securities services, and open banking integrations for corporate and institutional clients.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
